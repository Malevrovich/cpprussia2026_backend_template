  example-service:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        CONFIG_DIR: backend/example_service/configs
        BINARY_PATH: backend/example_service/build-release/example_service
    ports:
      - "8009:8009"
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
